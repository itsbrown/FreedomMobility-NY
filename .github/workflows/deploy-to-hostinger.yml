name: Deploy to Hostinger

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Ensure Rollup Linux binary (npm optional deps bug workaround)
        run: npm install @rollup/rollup-linux-x64-gnu --no-save

      - name: Build Astro site
        run: npm run build

      - name: Deploy to Hostinger via SFTP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 22
          source: "dist/*"
          target: "public_html"
          strip_components: 1
          rm: true
          debug: true
          # rm: true removes old files first for a clean deploy (recommended for static sites)
          # strip_components: 1 + "dist/*" uploads the *contents* of dist/ directly into public_html/ (no "dist" subfolder)
