[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Redirects for SPA-like behavior if needed, but this is fully static
[[redirects]]
  from = "/*"
  to = "/404"
  status = 404

# Form handling is automatic with data-netlify on the form
# See src/pages/contact.astro for the Netlify Forms setup

# Optional: Custom headers for security / performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"