name: Deploy to Hostinger

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Ensure Rollup Linux binary (npm optional deps bug workaround)
        run: npm install @rollup/rollup-linux-x64-gnu --no-save

      - name: Build Astro site
        run: npm run build

      - name: Deploy built site via Git (hostinger-deploy branch)
        run: |
          echo "Preparing clean deploy branch with only the built static files..."

          # Stage the built files
          rm -rf /tmp/site-deploy
          mkdir -p /tmp/site-deploy
          cp -r dist/* /tmp/site-deploy/

          # Fresh clone so we don't pollute the workspace
          git clone --depth 1 "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" /tmp/deploy-repo
          cd /tmp/deploy-repo

          # Force an orphan branch that contains *exactly* the website at its root
          git checkout --orphan hostinger-deploy 2>/dev/null || git checkout hostinger-deploy
          git rm -rf . 2>/dev/null || true

          cp -r /tmp/site-deploy/* .

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "Deploy ${{ github.sha }} ($(date -u +%Y-%m-%dT%H:%M:%SZ))" || echo "No changes"

          git push --force origin hostinger-deploy

          echo "✅ Successfully pushed to 'hostinger-deploy' branch."
          echo ""
          echo "Next steps in Hostinger hPanel:"
          echo "1. Go to your website → Git"
          echo "2. Connect/select the 'hostinger-deploy' branch"
          echo "3. Set the document root / public_html to serve from the root of that branch"
