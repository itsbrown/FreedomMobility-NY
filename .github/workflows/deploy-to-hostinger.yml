name: Deploy to Hostinger

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Ensure Rollup Linux binary (npm optional deps bug workaround)
        run: npm install @rollup/rollup-linux-x64-gnu --no-save

      - name: Build Astro site
        run: npm run build

      - name: Deploy to Hostinger via SFTP
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 22
          source: "dist/"
          target: "public_html"
          strip_components: 1
          rm: false
          overwrite: true
          debug: true
          timeout: "120s"
          command_timeout: "60s"
          # NOTE: The previous real error was "dial tcp 151.106.104.118:22: i/o timeout".
          # This means GitHub runner cannot reach Hostinger on port 22 (connection timeout).
          # Fix the YAML first (duration needs units like "120s"), then re-run.
          # Critical test: Try SFTP from *your laptop* to the same host:22 using the same credentials.
          # If that works but CI fails → Hostinger is blocking GitHub runner IPs (common on shared hosting).
