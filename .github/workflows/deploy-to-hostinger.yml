name: Deploy to Hostinger

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Ensure Rollup Linux binary (npm optional deps bug workaround)
        run: npm install @rollup/rollup-linux-x64-gnu --no-save

      - name: Build Astro site
        run: npm run build

      - name: Deploy to Hostinger via SFTP
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 22
          source: "dist/"
          target: "public_html"
          strip_components: 1
          rm: false
          overwrite: true
          debug: true
          timeout: 120
          command_timeout: 60
          # NOTE: Current error is "dial tcp ...:22: i/o timeout" — the GitHub runner cannot reach your Hostinger server on port 22.
          # This is almost always a firewall / IP blocking issue on Hostinger's shared hosting side.
          # Test: Can you SFTP to the same host:22 from your own computer? If yes, Hostinger is blocking GitHub runner IPs.
